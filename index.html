<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114~115年在職時數時數計算器-僅用於臺北市</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 900px; /* 超寬主容器，讓長文字舒展不擁擠 */
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle-main {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .section-title {
            font-size: 18px;
            color: #1e3a8a;
            border-left: 5px solid #2563eb;
            padding-left: 10px;
            margin: 35px 0 20px 0;
            font-weight: bold;
        }
        .form-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 12px;
        }
        /* 左側文字標籤：分配最大空間，維持寬裕感 */
        .form-group label {
            flex: 1;
            font-weight: 600;
            color: #475569;
            font-size: 15px;
            padding-right: 30px;
            line-height: 1.6;
        }
        /* 右側運算格子：縮短寬度，固定為 220px，視覺焦點更集中 */
        .input-block {
            display: flex;
            align-items: center;
            flex: 0 0 220px; 
            justify-content: flex-end;
            gap: 4px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            text-align: center;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #2563eb;
            outline: none;
        }
        .form-group input[readonly] {
            background-color: #f8fafc;
            color: #334155;
            border: 1px solid #e2e8f0;
            cursor: not-allowed;
            font-weight: 600;
        }
        .user-input {
            background-color: #fefce8; /* 淡黃底色提示手動輸入與選擇區 */
            border: 1px solid #eab308 !important;
        }
        /* 年月日格子的精簡寬度 */
        .year-input { width: 65px !important; }
        .date-select { width: 55px !important; }
        
        .unit {
            margin-left: 6px;
            color: #64748b;
            min-width: 45px;
            font-size: 14px;
            text-align: left;
        }
        .dynamic-highlight {
            color: #2563eb;
            font-weight: bold;
            background-color: #eff6ff;
            padding: 2px 6px;
            border-radius: 4px;
        }
        /* 注意事項區塊 */
        .attention-box {
            background-color: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 15px 20px;
            margin: 25px 0;
            border-radius: 4px;
        }
        .attention-box p {
            margin: 0;
            font-size: 14px;
            color: #92400e;
            line-height: 1.6;
        }
        .btn-container {
            text-align: center;
            margin-top: 35px;
        }
        .btn-clear {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 28px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-clear:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>114~115年在職時數時數計算器-僅用於臺北市</h2>
    <div class="subtitle-main">（僅適用於116年屆期換證者）</div>
    
    <div class="form-group">
        <label for="name">『姓名』：</label>
        <div class="input-block">
            <input type="text" id="name" class="user-input" placeholder="請輸入姓名" style="text-align: left;">
            <div class="unit"></div>
        </div>
    </div>
    
    <div class="form-group">
        <label>一、『登記證書到期日（登記證書底下的年月日）』：</label>
        <div class="input-block">
            <input type="number" id="docYear" class="user-input year-input" placeholder="民國" min="1" oninput="calculateAll()">
            <span style="font-size:13px; color:#64748b;">年</span>
            <select id="docMonth" class="user-input date-select" onchange="calculateAll()">
                <option value="">--</option>
                </select>
            <span style="font-size:13px; color:#64748b;">月</span>
            <select id="docDay" class="user-input date-select" onchange="calculateAll()">
                <option value="">--</option>
                </select>
            <span style="font-size:13px; color:#64748b;">日</span>
        </div>
    </div>
    
    <div class="form-group">
        <label for="row2">二、『114年在職年度到期日（等同登記證書底下的月日）』：</label>
        <div class="input-block">
            <input type="text" id="row2" readonly placeholder="系統自動對照">
            <div class="unit"></div>
        </div>
    </div>
    
    <div class="form-group">
        <label for="row3">三、『114年後半段月份數』：</label>
        <div class="input-block">
            <input type="text" id="row3" readonly placeholder="自動計算">
            <div class="unit">個月</div>
        </div>
    </div>
    
    <div class="form-group">
        <label for="row4">四、『114年應完成時數』：</label>
        <div class="input-block">
            <input type="text" id="row4" readonly placeholder="自動計算">
            <div class="unit">小時</div>
        </div>
    </div>
    
    <div class="form-group">
        <label id="label-row5">五、『114年（<span class="dynamic-highlight" id="dynamic-date">『二』的日期</span>至114/12/31）已完成時數(採認上限18小時)』：</label>
        <div class="input-block">
            <input type="number" id="row5" class="user-input" min="0" max="18" step="0.5" placeholder="自行輸入" oninput="calculateAll()">
            <div class="unit">小時</div>
        </div>
    </div>
    
    <div class="form-group">
        <label for="row6" style="color: #b91c1c;">六、『115年需要完成的時數』：</label>
        <div class="input-block">
            <input type="text" id="row6" readonly placeholder="自動計算" style="font-weight: bold; color: #b91c1c; background-color: #fef2f2;">
            <div class="unit" style="color: #b91c1c; font-weight: bold;">小時</div>
        </div>
    </div>

    <div class="section-title">116年屆期換證者換證時數計算</div>

    <div class="form-group">
        <label for="rowA">A、『換證前的月份比例』：</label>
        <div class="input-block">
            <input type="text" id="rowA" readonly placeholder="自動計算">
            <div class="unit"></div>
        </div>
    </div>

    <div class="form-group">
        <label for="rowB">B、『換證前要完成的時數』：</label>
        <div class="input-block">
            <input type="text" id="rowB" readonly placeholder="自動計算">
            <div class="unit">小時</div>
        </div>
    </div>

    <div class="attention-box">
        <p><strong>注意：</strong>若換證當年度的上課時間充裕，可於當年上完課程即可，換證當年度上課時間不足夠時，可以彈性的在前一年先完成應上時數。</p>
    </div>

    <div class="form-group" style="border-bottom: 2px solid #cbd5e1; padding-bottom: 20px;">
        <label for="rowC" style="color: #0369a1;">C、『屆期換證前一年（115年）可完成的時數』：</label>
        <div class="input-block">
            <input type="text" id="rowC" readonly placeholder="自動計算" style="color: #0369a1; background-color: #f0f9ff; font-size: 16px;">
            <div class="unit" style="color: #0369a1; font-weight: bold;">小時</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-clear" onclick="clearForm()">清除所有資料</button>
    </div>
</div>

<script>
// 初始化下拉選單
window.onload = function() {
    const monthSelect = document.getElementById('docMonth');
    for (let m = 1; m <= 12; m++) {
        monthSelect.options.add(new Option(m, m));
    }
    const daySelect = document.getElementById('docDay');
    for (let d = 1; d <= 31; d++) {
        daySelect.options.add(new Option(d, d));
    }
}

// 核心整合計算函式
function calculateAll() {
    const yearVal = document.getElementById('docYear').value;
    const monthVal = parseInt(document.getElementById('docMonth').value);
    const dayVal = parseInt(document.getElementById('docDay').value);
    
    const row2Input = document.getElementById('row2');
    const row3Input = document.getElementById('row3');
    const row4Input = document.getElementById('row4');
    const row5Input = document.getElementById('row5');
    const row6Input = document.getElementById('row6');
    
    const rowAInput = document.getElementById('rowA');
    const rowBInput = document.getElementById('rowB');
    const rowCInput = document.getElementById('rowC');
    
    const dynamicDateSpan = document.getElementById('dynamic-date');

    // 基礎防呆：若年月日未齊全，清空後續結果
    if (!yearVal || isNaN(monthVal) || isNaN(dayVal)) {
        row2Input.value = '';
        row3Input.value = '';
        row4Input.value = '';
        row6Input.value = '';
        rowAInput.value = '';
        rowBInput.value = '';
        rowCInput.value = '';
        dynamicDateSpan.innerText = '『二』的日期';
        return;
    }

    // 1. 二、『114年在職年度到期日』
    const displayMonth = monthVal < 10 ? '0' + monthVal : monthVal;
    const displayDay = dayVal < 10 ? '0' + dayVal : dayVal;
    const dateString114 = `114年${displayMonth}月${displayDay}日`;
    row2Input.value = dateString114;
    dynamicDateSpan.innerText = dateString114;

    // 2. 三、『114年後半段月份數』＝ 12 - 當前月份
    const row3 = 12 - monthVal;
    row3Input.value = row3;

    // 3. 四、『114年應完成時數』＝ 項目三 * 1.5
    const row4 = row3 * 1.5;
    row4Input.value = row4;

    // 4. 五、使用者輸入時數防呆 (上限 18 小時)
    let row5Value = parseFloat(row5Input.value);
    if (isNaN(row5Value)) row5Value = 0;
    if (row5Value < 0) {
        row5Value = 0;
        row5Input.value = 0;
    }
    if (row5Value > 18) {
        row5Value = 18;
        row5Input.value = 18;
    }

    // 5. 六、『115年需要完成的時數』＝ 18 + 四 - 五
    const row6 = 18 + row4 - row5Value;
    row6Input.value = Math.round(row6 * 10) / 10;

    // 6. A、『換證前的月份比例』＝ 12 - 第三列的數字 (row3)
    const rowA = 12 - row3;
    rowAInput.value = rowA;

    // 7. B、『換證前要完成的時數』＝ 項目A * 1.5
    const rowB = rowA * 1.5;
    rowBInput.value = rowB;

    // 8. C、『屆期換證前一年（115年）可完成的時數』＝ 六 + 項目B
    const rowC = row6 + rowB;
    rowCInput.value = Math.round(rowC * 10) / 10;
}

// 表單清空
function clearForm() {
    document.getElementById('name').value = '';
    document.getElementById('docYear').value = '';
    document.getElementById('docMonth').value = '';
    document.getElementById('docDay').value = '';
    document.getElementById('row2').value = '';
    document.getElementById('row3').value = '';
    document.getElementById('row4').value = '';
    document.getElementById('row5').value = '';
    document.getElementById('row6').value = '';
    document.getElementById('rowA').value = '';
    document.getElementById('rowB').value = '';
    document.getElementById('rowC').value = '';
    document.getElementById('dynamic-date').innerText = '『二』的日期';
}
</script>

</body>
</html>
