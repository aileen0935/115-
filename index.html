<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年在職時數時數計算器-僅適用於臺北市</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        h3 {
            color: #2980b9;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 18px;
            border-left: 4px solid #2980b9;
            padding-left: 10px;
        }
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .form-group label {
            flex: 0 0 250px;
            font-weight: bold;
            color: #34495e;
            font-size: 15px;
        }
        .form-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #3498db;
            outline: none;
        }
        .form-group input[readonly] {
            background-color: #eef2f5;
            color: #7f8c8d;
            border: 1px solid #dcdde1;
            cursor: not-allowed;
        }
        .user-input {
            background-color: #fffde7; /* 黃色背景提醒此欄位可手動輸入 */
            border: 1px solid #f1c40f !important;
        }
        .unit {
            margin-left: 10px;
            color: #7f8c8d;
            width: 50px;
            font-size: 14px;
        }
        .btn-container {
            text-align: center;
            margin-top: 25px;
        }
        .btn-clear {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>115年在職時數時數計算器-僅適用於臺北市</h2>
    
    <div class="form-group">
        <label for="name">一：姓名</label>
        <input type="text" id="name" placeholder="請輸入姓名">
        <div class="unit"></div>
    </div>
    
    <div class="form-group">
        <label for="expiryDate">二：114年當年度證書到期日</label>
        <input type="date" id="expiryDate" min="2025-01-01" max="2025-12-31" onchange="calculate()">
        <div class="unit"></div>
    </div>
    
    <div class="form-group">
        <label for="row3">三：114年後半段（證書生效日到114年12月）月份數</label>
        <input type="text" id="row3" readonly placeholder="自動計算">
        <div class="unit">個月</div>
    </div>
    
    <div class="form-group">
        <label for="row4">四：114年應完成時數</label>
        <input type="text" id="row4" readonly placeholder="自動計算">
        <div class="unit">小時</div>
    </div>
    
    <div class="form-group">
        <label for="row5">五：114年後半段（證書生效日到114/12/31）已經完成時數(採認上限18小時)</label>
        <input type="number" id="row5" class="user-input" min="0" max="18" step="0.5" placeholder="自行輸入" oninput="calculate()">
        <div class="unit">小時</div>
    </div>
    
    <div class="form-group">
        <label for="row6">六：115年（1/1~12/31）需要完成的時數</label>
        <input type="text" id="row6" readonly placeholder="自動計算" style="font-weight: bold; color: #c0392b;">
        <div class="unit">小時</div>
    </div>

    <h3>屆期換證年應上時數計算</h3>
    
    <div class="form-group">
        <label for="row9">A：「屆期換證當年」1/1~換證前的月份數</label>
        <input type="text" id="row9" readonly placeholder="自動計算">
        <div class="unit"></div>
    </div>
    
    <div class="form-group">
        <label for="row10">B：屆期換證前要完成的時數</label>
        <input type="text" id="row10" readonly placeholder="自動計算">
        <div class="unit">小時</div>
    </div>
    
    <div class="form-group">
        <label for="row11">C：可提前於換證前一年完成的時數</label>
        <input type="text" id="row11" readonly placeholder="自動計算" style="font-weight: bold; color: #27ae60;">
        <div class="unit">小時</div>
    </div>

    <div class="btn-container">
        <button class="btn-clear" onclick="clearForm()">清除資料</button>
    </div>
</div>

<script>
function calculate() {
    // 1. 處理第五列的自行輸入數值與防呆
    const row5Input = document.getElementById('row5');
    let row5Value = parseFloat(row5Input.value);

    if (isNaN(row5Value)) {
        row5Value = 0;
    }
    if (row5Value < 0) {
        row5Value = 0;
        row5Input.value = 0;
    }
    if (row5Value > 18) {
        row5Value = 18;
        row5Input.value = 18;
    }

    // 2. 檢查是否已選擇日期，若無則不往下計算其他連動欄位
    const dateInput = document.getElementById('expiryDate').value;
    if (!dateInput) {
        return;
    }

    // 3. 解析日期與各欄位核心計算
    const selectedDate = new Date(dateInput);
    const month = selectedDate.getMonth() + 1; // 1 ~ 12 月

    // 第三列：114年後半段月份數 = 12 - 到期日月份
    const row3 = 12 - month;
    
    // 第四列：114年應完成時數 = 第三列 * 1.5
    const row4 = row3 * 1.5;

    // 【新公式】第六列：115年需要完成的時數 = 18 + 第四列時數 - 第五列時數
    const row6 = 18 + row4 - row5Value;

    // 第九列：換證前的月份比例 = 12 - 第三列
    const row9 = 12 - row3;

    // 第十列：換證前要完成的時數 = 第九列 * 1.5
    const row10 = row9 * 1.5;

    // 第十一列：換證前一年可完成的時數 = 18 + 第十列
    const row11 = 18 + row10;

    // 4. 將計算結果渲染至網頁畫面上
    document.getElementById('row3').value = row3;
    document.getElementById('row4').value = row4;
    document.getElementById('row6').value = row6;
    document.getElementById('row9').value = row9;
    document.getElementById('row10').value = row10;
    document.getElementById('row11').value = row11;
}

function clearForm() {
    document.getElementById('name').value = '';
    document.getElementById('expiryDate').value = '';
    document.getElementById('row3').value = '';
    document.getElementById('row4').value = '';
    document.getElementById('row5').value = '';
    document.getElementById('row6').value = '';
    document.getElementById('row9').value = '';
    document.getElementById('row10').value = '';
    document.getElementById('row11').value = '';
}
</script>

</body>
</html>
